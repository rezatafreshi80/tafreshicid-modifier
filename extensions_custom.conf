#include tafreshicid
[tafreshicid]
; ---------------------------------------------------------
; Normalize Caller ID for Iran Telecom (TCI / SIP Trunks)
; Designed for Issabel / Asterisk / FreePBX
; ---------------------------------------------------------

; 1. Convert 98 or +98 to 0
exten => _X.,1,ExecIf($["${CALLERID(number):0:2}" = "98"]?Set(CALLERID(number)=0${CALLERID(number):2}))
exten => _X.,n,ExecIf($["${CALLERID(number):0:3}" = "+98"]?Set(CALLERID(number)=0${CALLERID(number):3}))

; 2. Remove 021 prefix
exten => _X.,n,ExecIf($["${CALLERID(number):0:3}" = "021"]?Set(CALLERID(number)=${CALLERID(number):3}))

; 3. Remove 21 prefix
exten => _X.,n,ExecIf($["${CALLERID(number):0:2}" = "21"]?Set(CALLERID(number)=${CALLERID(number):2}))

; 4. Send to Issabel default inbound context
exten => _X.,n,Goto(from-pstn,${EXTEN},1)
